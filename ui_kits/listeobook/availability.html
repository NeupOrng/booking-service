<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ListeoBook — Availability Hours</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="availability.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Atoms.jsx"></script>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="AvailabilityHours.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SAMPLE_RULES = [
      { id:'r1', dayOfWeek:'Monday',    startTime:'09:00', endTime:'12:00', slotDurationMinutes:60, capacity:1 },
      { id:'r2', dayOfWeek:'Monday',    startTime:'14:00', endTime:'18:00', slotDurationMinutes:60, capacity:2 },
      { id:'r3', dayOfWeek:'Tuesday',   startTime:'09:00', endTime:'17:00', slotDurationMinutes:60, capacity:1 },
      { id:'r4', dayOfWeek:'Wednesday', startTime:'10:00', endTime:'19:00', slotDurationMinutes:30, capacity:1 },
      { id:'r5', dayOfWeek:'Thursday',  startTime:'09:00', endTime:'17:00', slotDurationMinutes:60, capacity:1 },
      { id:'r6', dayOfWeek:'Friday',    startTime:'08:00', endTime:'14:00', slotDurationMinutes:45, capacity:2 },
      { id:'r7', dayOfWeek:'Saturday',  startTime:'10:00', endTime:'16:00', slotDurationMinutes:60, capacity:1 },
    ];

    const Demo = () => {
      useEffect(() => { if (window.lucide) lucide.createIcons(); });
      return (
        <div className="lb-app">
          <Navbar
            user={{ fullName: 'Alex Morgan' }}
            currentPath="/business/availability"
            onSignIn={() => {}}
            onSignOut={() => {}}
            onNav={() => {}}
          />
          <main className="lb-main">
            <AvailabilityHours
              service={{ name: 'Deep Tissue Massage' }}
              rules={SAMPLE_RULES}
              initialDay="Wednesday"
              onAddRule={(day) => console.log('add', day)}
              onEditRule={(rule) => console.log('edit', rule)}
              onCopyDay={(day) => console.log('copy day', day)}
              onCopyWeek={() => console.log('copy week')}
              onAddOverride={() => console.log('overrides')}
              onApplyTemplate={(t) => console.log('template', t)}
              onBack={() => console.log('back')}
            />
          </main>
          <Footer />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
